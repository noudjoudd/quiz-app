<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(to right, #5f2c82, #49a09d);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .quiz-container{
            background:white;
            width:500px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            color:#5f2c82;
            margin-bottom:25px;
        }

        .question-box{
            margin-bottom:25px;
        }

        .question{
            font-size:20px;
            font-weight:bold;
            margin-bottom:15px;
            color:#333;
        }

        .answers button{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:none;
            border-radius:10px;
            background:#f1f1f1;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .answers button:hover{
            background:#5f2c82;
            color:white;
        }

    </style>

</head>
<body>

    <div class="quiz-container">

        <h1>Quiz App</h1>


        <div class="question-box">

            <div class="question">
                1. Which planet is known as the Red Planet?
            </div>

            <div class="answers">
                <button>Earth</button>
                <button>Mars</button>
                <button>Venus</button>
                <button>Jupiter</button>
            </div>

        </div>



        <div class="question-box">

            <div class="question">
                2. What is the capital of Japan?
            </div>

            <div class="answers">
                <button>Tokyo</button>
                <button>Seoul</button>
                <button>Bangkok</button>
                <button>Beijing</button>
            </div>

        </div>

   

        <div class="question-box">

            <div class="question">
                3. Who wrote Romeo and Juliet?
            </div>

            <div class="answers">
                <button>William Shakespeare</button>
                <button>Victor Hugo</button>
                <button>Charles Dickens</button>
                <button>J.K. Rowling</button>
            </div>

        </div>



        <div class="question-box">

            <div class="question">
                4. Which animal is the largest mammal?
            </div>

            <div class="answers">
                <button>Elephant</button>
                <button>Blue Whale</button>
                <button>Giraffe</button>
                <button>Shark</button>
            </div>

        </div>



        <div class="question-box">

            <div class="question">
                5. How many continents are there on Earth?
            </div>

            <div class="answers">
                <button>5</button>
                <button>6</button>
                <button>7</button>
                <button>8</button>
            </div>

        </div>

    </div>

</body>
</html>
