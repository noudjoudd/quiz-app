<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="quiz-container">

        <h1>Quiz App</h1>


        <div class="question-box">
            <div class="question">1. Which planet is known as the Red Planet?</div>
            <div class="answers">
                <button>Earth</button>
                <button>Mars</button>
                <button>Venus</button>
                <button>Jupiter</button>
            </div>
        </div>


        <div class="question-box">
            <div class="question">2. What is the capital of Japan?</div>
            <div class="answers">
                <button>Tokyo</button>
                <button>Seoul</button>
                <button>Bangkok</button>
                <button>Beijing</button>
            </div>
        </div>

        <div class="question-box">
            <div class="question">3. Who wrote Romeo and Juliet?</div>
            <div class="answers">
                <button>William Shakespeare</button>
                <button>Victor Hugo</button>
                <button>Charles Dickens</button>
                <button>J.K. Rowling</button>
            </div>
        </div>

  
        <div class="question-box">
            <div class="question">4. Which animal is the largest mammal?</div>
            <div class="answers">
                <button>Elephant</button>
                <button>Blue Whale</button>
                <button>Giraffe</button>
                <button>Shark</button>
            </div>
        </div>

        <div class="question-box">
            <div class="question">5. How many continents are there on Earth?</div>
            <div class="answers">
                <button>5</button>
                <button>6</button>
                <button>7</button>
                <button>8</button>
            </div>
        </div>

    </div>

</body>
</html>
